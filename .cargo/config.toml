[target.thumbv6m-none-eabi]
runner = "./runner.sh"

rustflags = [
  "-C", "link-arg=-Tlink.x", # linker file
  "-C", "link-arg=--nmagic", # no std memory layout
  "-C", "link-arg=-Tdefmt.x", # add defmt
  "-C", "target-cpu=cortex-m0plus", # add target cpu
]

[build]
target = "thumbv6m-none-eabi"

[net]
git-fetch-with-cli = true
